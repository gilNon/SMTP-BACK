
services:
  minio:
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]
    volumes:
      - data-minio:/data
    environment:
      MINIO_ROOT_USER: changemeuser
      MINIO_ROOT_PASSWORD: changemepass

  minio-buckets:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set dockerminio http://minio:9000 changemeuser changemepass;
      /usr/bin/mc mb dockerminio/yourbucketname;
      exit 0;
      "
  

  postgres:
    image: postgres:16
    container_name: postgres-fake-smtp
    restart: unless-stopped

    environment:
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: developer
      POSTGRES_DB: smtp_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developer -d smtp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  data-minio: