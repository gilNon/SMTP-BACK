spring:
  application:
    name: email-microservice
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true
  datasource:
    url: ${DB_URL_CONNECTION}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
server:
  port: ${SERVER_PORT}

eureka:
  instance:
    preferIpAddress: true
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: "${EUREKA_SERVER_URL}"
smtp-server:
  user: ${USER_SMTP}
  host: ${HOST_SMTP}
  ssl: ${SSL_SMTP},
  tls: ${TLS_SMTP},
  port: ${PORT_SMTP}

user-default:
  name: ${NAME_DEFAULT}
  lastName: ${LAST_NAME_DEFAULT}
  email: ${EMAIL_DEFAULT}
  password: ${PASSWORD_DEFAULT}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:changemeuser}
  secret-key: ${MINIO_SECRET_KEY:changemepass}
  bucket-name: ${MINIO_BUCKET_NAME:fake-smtp}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 1.0.0
    description: Email microservice for SMTP BACKEND




